plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.13'
}

dependencies {
    implementation project(':core')
}

javafx {
    version = '17'
    modules = ['javafx.controls', 'javafx.fxml']
}

application {
    mainClass = 'com.emulator.launcher.Main'
}

jar {
    // Фиксируем имя, чтобы сборщик .exe его сразу нашёл
    archiveFileName = 'launcher.jar'
    manifest {
        attributes('Main-Class': 'com.emulator.launcher.Main')
    }
}

// Скрипт, который копирует абсолютно все библиотеки приложения в одну папку для упаковки в .exe
tasks.register('copyDependencies', Copy) {
    dependsOn jar
    from configurations.runtimeClasspath
    from jar.archiveFile
    into "${project.layout.buildDirectory.get().asFile}/libs"
}
build.dependsOn copyDependencies
