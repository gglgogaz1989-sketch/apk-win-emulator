name: Build APK Emulator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Настройка Gradle и кэширования
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # Просто проверяем, собирается ли проект целиком
    - name: Build with Gradle
      run: ./gradlew build --no-daemon
